version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: "/app/native-server"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: "/app/chrome-extension"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: "/packages/shared"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
