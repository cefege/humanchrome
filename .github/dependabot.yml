version: 2
updates:
  # Policy: dependabot proposes only minor + patch bumps automatically.
  # Major bumps are deliberate human decisions — opened ad-hoc, not weekly —
  # so we ignore semver-major across every npm ecosystem below.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/app/native-server"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/app/chrome-extension"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # @types/chrome lives in 0.x-land where DefinitelyTyped reorgs ship
      # as semver-minor (0.0.x → 0.1.y) but are functionally breaking.
      # Ignore all bumps; pin manually when the chrome.* type rework is scheduled.
      - dependency-name: "@types/chrome"

  - package-ecosystem: npm
    directory: "/packages/shared"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
